  <header><h1>furnACE – Handcrafted Timber Art &amp; Décor, Helensville New Zealand</h1></header>
  <main>
    <p>furnACE creates handcrafted timber art and décor inspired by Aotearoa, laser-cut, hand-assembled, and finished in our Helensville workshop. Designed &amp; made in Helensville NZ. Real timber, no MDF kits. Original furnACE designs. Real photos, real products.</p>
    <h2>Product Collection</h2>
    <article><h3>Kea Alpine Landscape – NZ$349</h3><p>Statement Wall Art · 750×490mm. Two-layer Okoume plywood. Walnut-stained silhouette floating above a warm natural backer. Solid black walnut frame. Shadow lines shift as light moves through the day.</p></article>
    <article><h3>The Curve – Diptych Pair – NZ$299</h3><p>Contemporary Wall Art · 2 panels. Laser-cut Okoume ply strips assembled into a continuous wave form across two panels. Pine frame, painted black matte. No comparable piece exists online.</p></article>
    <article><h3>NZ Native Bird Chess Set – NZ$795</h3><p>Collector Piece · 32 hand-cast pieces. Hand-cast resin from original sculpts. White antique and jade green resin. Black walnut board with pāua shell inlay. Koru storage box. King=Falcon, Queen=Kiwi, Pawn=Fantail.</p></article>
    <article><h3>Kids Night Light – NZ$95</h3><p>Lighting · Fantail or Tui · USB. Cartoon-cute NZ bird laser-cut in two layers of Okoume plywood. 3000K warm-white LED strip runs the full perimeter creating a golden halo on the wall.</p></article>
    <article><h3>Tui &amp; Fantail Twilight Series – NZ$189</h3><p>Statement Wall Art · A3 Landscape. Sunset ombré background from deep red to charcoal. Float-mounted silhouettes with koru-scroll detail. Black walnut frame. Two colourways: matte black or natural timber.</p></article>
    <article><h3>Acrylic LED Bird Lights – NZ$99</h3><p>Lighting · 6 Designs · Matai Base. 10mm cast acrylic, laser-engraved NZ native bird, shape-cut to silhouette. Every fine line glows in warm-white edge-lit LED. Recycled Matai base. USB powered.</p></article>
    <article><h3>NZ Bird Wall Clock – NZ$139</h3><p>Functional Art · Silent Sweep Movement. 4mm walnut-stained Okoume ply bird on 7mm pine backer. Macrocarpa frame. Silent sweep quartz movement. Choose Fantail, Morepork, or Tui.</p></article>
    <article><h3>Kingfisher Wall Art – NZ$179</h3><p>Wall Art · A3 Portrait · Macrocarpa Frame. Multi-layer plywood with oak and NZ hardwood veneer layers. NZ map outline and koru motif woven through the design.</p></article>
    <article><h3>Fantail (Pīwakawaka) Wall Art – NZ$95</h3><p>Wall Art · A4 · Macrocarpa Frame. Layered Fantail with cherry blossom design on stained backer. Available in dark walnut or charcoal.</p></article>
    <article><h3>Morepork (Ruru) Wall Art – NZ$95</h3><p>Wall Art · A4 · Macrocarpa Frame. NZ's only surviving native owl, layered plywood with floral motif on stained backer. Dark walnut or charcoal colourway.</p></article>
    <article><h3>Fantail Key Holder – NZ$85</h3><p>Functional Wall Art · 5 Bronze Hooks. Three-layer painted plywood Fantail with cherry blossom arch. Wall-mount hardware included.</p></article>
    <article><h3>Bee &amp; Manuka Key Holder – NZ$85</h3><p>Functional Wall Art · 7 Black Hooks. Three-layer painted plywood Bee and Manuka blossom arch. A garden-inspired entry piece.</p></article>
    <article><h3>Birds of Aotearoa Coasters – NZ$79</h3><p>Giftware · Set of 5 + A-Frame Holder. Five solid Macrocarpa coasters, each laser-engraved with a NZ native bird. Four themed collections.</p></article>
    <article><h3>NZ Bird Candle Holders – NZ$59</h3><p>Gifting · Macrocarpa · Tealight Included. Solid Macrocarpa candle holder, laser-engraved NZ native bird. Five designs: Fantail, Morepork, Kereru, Tui, Weka.</p></article>
    <article><h3>The Nest Egg – NZ$59</h3><p>Unique Gift · Kiwi Coin Bank. Kiwi-silhouette coin bank. Pine centre, maple-stained Okoume ply faces, clear acrylic window to watch your savings grow.</p></article>
    <article><h3>NZ Bird Lantern – NZ$149</h3><p>Lighting · Japanese Style · Macrocarpa. Macrocarpa frame with NZ bird panel designs. Washi paper diffuser. USB warm-white LED.</p></article>
    <article><h3>Elevated Pet Feeder – NZ$175</h3><p>Pet Homewares · Bowls Included. Solid white oak top, pine base. Two stainless steel bowls included. Gilly's food-safe Hard Wax Oil.</p></article>
    <h2>About furnACE</h2>
    <p>furnACE is a New Zealand handcrafted timber art and décor brand, designed and produced from a home workshop in Helensville, Auckland. No AI-generated imagery. No mass-produced imports. No MDF kits. Real timber, layered construction, and finishes built to last decades. Custom commissions welcome.</p>
